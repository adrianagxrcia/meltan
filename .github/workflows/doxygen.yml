# Genera la documentacion con Doxygen y la publica en GitHub Pages.
# Se ejecuta en cada push a la rama principal.
name: Documentacion Doxygen

on:
  push:
    branches: [main]
  workflow_dispatch:        # permite lanzarlo a mano desde la pestana Actions

# Permisos necesarios para publicar en GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Generar la documentacion
        run: doxygen Doxyfile

      - name: Preparar el artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4